<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32-C3 Servo Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #2c3e50; color: white; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        .status-box { background: #34495e; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        
        /* D-Pad Layout */
        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 15px;
            width: 280px;
            margin: 30px auto;
        }
        
        button {
            width: 80px; height: 80px; border: none; border-radius: 15px;
            font-size: 24px; font-weight: bold; cursor: pointer;
            background-color: #ecf0f1; color: #2c3e50;
            box-shadow: 0 6px #bdc3c7; transition: 0.1s;
            display: flex; align-items: center; justify-content: center;
        }

        button:active { box-shadow: 0 2px #bdc3c7; transform: translateY(4px); background-color: #dcdde1; }
        
        .btn-connect { width: 100%; height: auto; padding: 15px; background-color: #27ae60; color: white; box-shadow: 0 6px #1e8449; margin-bottom: 10px; font-size: 18px; }
        .btn-up { grid-column: 2; background-color: #3498db; color: white; box-shadow: 0 6px #2980b9; }
        .btn-left { grid-column: 1; grid-row: 2; background-color: #3498db; color: white; box-shadow: 0 6px #2980b9; }
        .btn-right { grid-column: 3; grid-row: 2; background-color: #3498db; color: white; box-shadow: 0 6px #2980b9; }
        .btn-down { grid-column: 2; grid-row: 3; background-color: #3498db; color: white; box-shadow: 0 6px #2980b9; }
        
        .empty { visibility: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h2>Servo Controller</h2>
    <div class="status-box" id="status">สถานะ: กรุณาเชื่อมต่อ Bluetooth</div>
    
    <button class="btn-connect" onclick="connectBLE()">🔗 เชื่อมต่อ ESP32-C3</button>

    <div class="control-grid">
        <div class="empty"></div>
        <button class="btn-up" onclick="sendCommand('U')">▲</button>
        <div class="empty"></div>

        <button class="btn-left" onclick="sendCommand('L')">◀</button>
        <div class="empty"></div>
        <button class="btn-right" onclick="sendCommand('R')">▶</button>

        <div class="empty"></div>
        <button class="btn-down" onclick="sendCommand('D')">▼</button>
        <div class="empty"></div>
    </div>
</div>

<script>
let charac;
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHARACTERISTIC_UUID = "6d6534e4-4d21-4d1a-9694-8740f901a1c3";

async function connectBLE() {
    const statusDiv = document.getElementById('status');
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'ESP32-C3-Control' }],
            optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        charac = await service.getCharacteristic(CHARACTERISTIC_UUID);
        statusDiv.innerText = "สถานะ: เชื่อมต่อสำเร็จ ✅";
        statusDiv.style.color = "#2ecc71";
    } catch (error) {
        statusDiv.innerText = "ข้อผิดพลาด: " + error;
    }
}

async function sendCommand(val) {
    if (!charac) return;
    try {
        const data = new TextEncoder().encode(val);
        await charac.writeValue(data);
    } catch (error) {
        console.log("Error: " + error);
    }
}
</script>
</body>
</html>
