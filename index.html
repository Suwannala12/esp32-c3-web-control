<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32-C3 Advanced Controller</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --btn-main: #3b82f6;
            --btn-action: #f59e0b;
            --btn-conn: #10b981;
            --btn-active: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        .dashboard {
            background: var(--card);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(4, 85px);
            gap: 15px;
        }

        button {
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        /* การจัดวางตำแหน่งปุ่ม */
        .btn-a { grid-column: 1; grid-row: 1; background: var(--btn-action); }
        .btn-b { grid-column: 3; grid-row: 1; background: var(--btn-action); }

        .btn-up { grid-column: 2; grid-row: 2; background: var(--btn-main); }
        .btn-left { grid-column: 1; grid-row: 3; background: var(--btn-main); }
        .btn-right { grid-column: 3; grid-row: 3; background: var(--btn-main); }
        .btn-down { grid-column: 2; grid-row: 4; background: var(--btn-main); }

        .btn-connect { 
            grid-column: 3; grid-row: 4; 
            background: var(--btn-conn); 
            font-size: 28px;
            border-radius: 50%;
        }

        .connected { background: var(--btn-active) !important; }

        #status {
            grid-column: 1 / span 3;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div id="status">สถานะ: รอการเชื่อมต่อ</div>

    <div class="dashboard">
        <button class="btn-a" onclick="send('A')">A</button>
        <button class="btn-b" onclick="send('B')">B</button>

        <button class="btn-up" onclick="send('U')">▲</button>
        <button class="btn-left" onclick="send('L')">◀</button>
        <button class="btn-right" onclick="send('R')">▶</button>
        <button class="btn-down" onclick="send('D')">▼</button>

        <button id="conn-btn" class="btn-connect" onclick="connect()">🔗</button>
    </div>

    <script>
        let characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "6d6534e4-4d21-4d1a-9694-8740f901a1c3";

        async function connect() {
            const status = document.getElementById('status');
            const btn = document.getElementById('conn-btn');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                status.innerText = "เชื่อมต่อแล้ว ✅";
                status.style.color = "#10b981";
                btn.classList.add('connected');
            } catch (err) {
                status.innerText = "การเชื่อมต่อผิดพลาด";
                console.error(err);
            }
        }

        async function send(val) {
            if (!characteristic) return;
            try {
                const data = new TextEncoder().encode(val);
                await characteristic.writeValue(data);
            } catch (err) {
                console.log("Send Error:", err);
            }
        }
    </script>
</body>
</html>
