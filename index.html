<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32-C3 Haptic Controller v3</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --btn-main: #3b82f6;
            --btn-action: #f59e0b;
            --btn-conn: #10b981;
            --btn-active-color: #ef4444; /* สีตอนกดปุ่มทั่วไป */
            --btn-shadow: rgba(0,0,0,0.5);
            --btn-press-shadow: rgba(239, 68, 68, 0.5); /* สีเงาตอนกด */
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* สำคัญมาก: ป้องกัน browser จัดการ touch เอง */
        }

        .dashboard {
            background: var(--card);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: grid;
            grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(4, 85px);
            gap: 18px;
            position: relative;
        }

        button {
            border: none;
            border-radius: 22px;
            color: white;
            font-size: 26px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.05s ease-out; /* เร็วมากตอนกด */
            box-shadow: 0 8px 0 var(--btn-shadow);
            position: relative;
            top: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* เอฟเฟกต์ตอนกดปุ่ม (Visual Feedback) */
        button:active {
            top: 6px; /* ปุ่มยุบลง */
            box-shadow: 0 2px 0 var(--btn-shadow), 0 0 15px var(--btn-press-shadow); /* เงายุบและเปลี่ยนสี */
        }

        /* การจัดวางตำแหน่งปุ่ม */
        .btn-a { grid-column: 1; grid-row: 1; background: var(--btn-action); --btn-press-shadow: rgba(245, 158, 11, 0.6); }
        .btn-b { grid-column: 3; grid-row: 1; background: var(--btn-action); --btn-press-shadow: rgba(245, 158, 11, 0.6); }

        .btn-up { grid-column: 2; grid-row: 2; background: var(--btn-main); }
        .btn-left { grid-column: 1; grid-row: 3; background: var(--btn-main); }
        .btn-right { grid-column: 3; grid-row: 3; background: var(--btn-main); }
        .btn-down { grid-column: 2; grid-row: 4; background: var(--btn-main); }

        /* ปุ่มเชื่อมต่อ */
        .btn-connect { 
            grid-column: 3; grid-row: 4; 
            background: var(--btn-conn); 
            font-size: 30px;
            border-radius: 50%;
            --btn-press-shadow: rgba(16, 185, 129, 0.6);
        }

        /* สถานะเมื่อเชื่อมต่อแล้ว */
        .connected { 
            background: var(--btn-active-color) !important; 
            --btn-press-shadow: rgba(239, 68, 68, 0.6) !important;
        }

        #status {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="status">สถานะ: รอการเชื่อมต่อ Bluetooth</div>

    <div class="dashboard">
        <button class="btn-a" onpointerdown="processInput('A')" onpointerup="stopInput()">A</button>
        <button class="btn-b" onpointerdown="processInput('B')" onpointerup="stopInput()">B</button>

        <button class="btn-up" onpointerdown="processInput('U')" onpointerup="stopInput()">▲</button>
        <button class="btn-left" onpointerdown="processInput('L')" onpointerup="stopInput()">◀</button>
        <button class="btn-right" onpointerdown="processInput('R')" onpointerup="stopInput()">▶</button>
        <button class="btn-down" onpointerdown="processInput('D')" onpointerup="stopInput()">▼</button>

        <button id="conn-btn" class="btn-connect" onclick="connect()">🔗</button>
    </div>

    <script>
        let characteristic;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHAR_UUID = "6d6534e4-4d21-4d1a-9694-8740f901a1c3";
        let isPressed = false;

        // ฟังก์ชันจัดการการสั่น (Haptic Feedback)
        function vibrateShort() {
            if (navigator.vibrate) {
                // สั่นสั้นๆ 20 มิลลิวินาที (ทำได้บน Android)
                navigator.vibrate(20); 
            }
        }

        async function connect() {
            vibrateShort(); // สั่นตอนกดปุ่มเชื่อมต่อ
            const statusLabel = document.getElementById('status');
            const connBtn = document.getElementById('conn-btn');
            statusLabel.innerText = "กำลังค้นหาอุปกรณ์...";

            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }],
                    optionalServices: [SERVICE_UUID]
                });
                statusLabel.innerText = "กำลังเชื่อมต่อ...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                statusLabel.innerText = "เชื่อมต่อแล้ว ✅ พร้อมควบคุม";
                statusLabel.style.color = "#10b981";
                connBtn.classList.add('connected');
                vibrateShort(); // สั่นอีกครั้งเมื่อเชื่อมต่อสำเร็จ
            } catch (err) {
                statusLabel.innerText = "การเชื่อมต่อล้มเหลว หรือถูกยกเลิก";
                statusLabel.style.color = "#ef4444";
                console.error(err);
            }
        }

        // ฟังก์ชันหลักเมื่อมีการกดปุ่ม
        function processInput(val) {
            if (isPressed) return; // ป้องกันการกดซ้ำซ้อน
            isPressed = true;
            vibrateShort(); // <--- สั่นทันทีที่นิ้วแตะโดนปุ่ม!
            send(val);
        }

        function stopInput() {
            isPressed = false;
        }

        async function send(val) {
            if (!characteristic) {
                console.log("ยังไม่ได้เชื่อมต่อ Bluetooth");
                return;
            }
            try {
                const data = new TextEncoder().encode(val);
                // ใช้ writeValueWithoutResponse เพื่อความเร็ว (ถ้า ESP32 รองรับ)
                await characteristic.writeValueWithoutResponse(data);
                console.log("Sent:", val);
            } catch (err) {
                console.log("Send Error:", err);
            }
        }
    </script>
</body>
</html>
